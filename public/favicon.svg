<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .logo-pulse { animation: pulse 2s infinite; }
    </style>
  </defs>
  
  <!-- Fundo -->
  <rect width="200" height="200" fill="#0f172a" rx="40"/>
  
  <!-- Círculo indigo com pulse -->
  <circle cx="100" cy="100" r="35" fill="#4f46e5" class="logo-pulse"/>
  
  <!-- Texto TO (iniciais) -->
  <text x="100" y="115" font-size="48" font-weight="bold" fill="white" text-anchor="middle" font-family="system-ui">TO</text>
</svg>